name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  version-tag:
    name: Tag release version
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version tag
        id: tag
        run: |
          VERSION=$(date -u +%Y.%m.%d.%H%M%S)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: version-tag

    steps:
      - name: Write SSH key
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/deploy_key

      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERSION: ${{ needs.version-tag.outputs.version }}
        run: |
          ssh -i /tmp/deploy_key \
              -o StrictHostKeyChecking=no \
              ubuntu@"$EC2_HOST" \
              "VERSION='$VERSION' \
               AI_PROVIDER='$AI_PROVIDER' \
               GEMINI_API_KEY='$GEMINI_API_KEY' \
               OPENAI_API_KEY='$OPENAI_API_KEY' \
               bash -s" << 'ENDSSH'

            set -e
            cd /app

            # Pull latest code
            git fetch origin main
            git reset --hard origin/main

            # Recreate backend/.env from the secrets passed above
            cat > backend/.env << EOF
            DATABASE_URL=postgresql://app:localdev@db:5432/reading_helper
            AI_PROVIDER=$AI_PROVIDER
            GEMINI_API_KEY=$GEMINI_API_KEY
            OPENAI_API_KEY=$OPENAI_API_KEY
            EOF

            # Build and restart containers (brief downtime ~10-30s)
            docker compose build
            docker compose up -d

            echo "Deployed version $VERSION"
          ENDSSH

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/deploy_key
